<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>属灵恩赐测试</title>
  <style>
    :root { --primary:#1f4e78; --primary-light:#eaf3fb; --accent:#2f75b5; --bg:#f6f8fb; --card:#fff; --text:#1f2937; --muted:#6b7280; --border:#d9e2f3; --success:#198754; --danger:#dc3545; --warn:#b45309; --shadow:0 10px 28px rgba(31,78,120,.10); }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Microsoft YaHei","PingFang SC","Noto Sans SC",Arial,sans-serif; background:var(--bg); color:var(--text); }
    .app { max-width:1100px; margin:0 auto; padding:24px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:18px; box-shadow:var(--shadow); padding:28px; }
    h1 { color:var(--primary); margin:0 0 10px; font-size:32px; }
    h2 { color:var(--primary); margin:0 0 18px; font-size:24px; }
    p { line-height:1.7; }
    .muted { color:var(--muted); }
    .hidden { display:none !important; }
    .row { display:flex; gap:16px; flex-wrap:wrap; }
    .field { flex:1 1 260px; }
    label { display:block; font-weight:700; margin:12px 0 6px; }
    input[type="text"], input[type="email"], input[type="url"] { width:100%; padding:14px 16px; border:1px solid #cbd5e1; border-radius:12px; font-size:16px; }
    button { border:0; border-radius:12px; padding:13px 20px; cursor:pointer; font-size:16px; font-weight:700; }
    .btn-primary { background:var(--primary); color:white; }
    .btn-secondary { background:#6c757d; color:white; }
    .btn-success { background:var(--success); color:white; }
    .btn-light { background:#e7eef7; color:var(--primary); }
    .btn-danger { background:var(--danger); color:white; }
    .actions { display:flex; justify-content:space-between; align-items:center; gap:14px; margin-top:24px; flex-wrap:wrap; }
    .pill { display:inline-block; background:#e7eef7; color:var(--primary); border-radius:999px; padding:7px 12px; font-weight:700; }
    .note { background:#fff7ed; color:#7c2d12; border:1px solid #fed7aa; padding:14px 16px; border-radius:12px; margin:14px 0; }
    .oknote { background:#ecfdf5; color:#065f46; border:1px solid #a7f3d0; padding:14px 16px; border-radius:12px; margin:14px 0; }
    .failnote { background:#fef2f2; color:#991b1b; border:1px solid #fecaca; padding:14px 16px; border-radius:12px; margin:14px 0; }
    .setup { background:#f8fafc; border:1px dashed #94a3b8; border-radius:14px; padding:14px; margin-top:18px; }
    .progress-wrap { background:#e5e7eb; height:12px; border-radius:999px; overflow:hidden; margin:18px 0; }
    .progress-bar { background:linear-gradient(90deg,var(--primary),var(--accent)); height:100%; width:0%; transition:.25s; }
    .question { font-size:23px; line-height:1.58; margin:28px 0; min-height:120px; }
    .option { display:flex; align-items:center; gap:12px; border:1px solid #d7deea; border-radius:14px; padding:15px 16px; margin:12px 0; background:#fff; cursor:pointer; user-select:none; }
    .option:hover { border-color:var(--accent); background:#f4f8fd; }
    .option input { width:22px; height:22px; }
    .review-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(62px,1fr)); gap:10px; margin-top:18px; }
    .qdot { padding:10px; border-radius:12px; background:#f8d7da; color:#842029; text-align:center; font-weight:700; cursor:pointer; }
    .qdot.done { background:#d1e7dd; color:#0f5132; }
    table { width:100%; border-collapse:collapse; margin-top:16px; background:#fff; }
    th, td { padding:12px; border-bottom:1px solid var(--border); text-align:left; vertical-align:top; }
    th { background:var(--primary); color:white; }
    .top-card { border-left:6px solid var(--primary); background:var(--primary-light); padding:16px; border-radius:14px; margin:12px 0; }

    @media print { body { background:white; } .no-print { display:none !important; } .card { box-shadow:none; border:0; } .app { max-width:100%; padding:0; } }

</head>
<body>
  <div class="app">
    <section id="screenWelcome" class="card">
      <h1>属灵恩赐测试</h1>
      <p class="muted">完成后会自动计算结果，并提交至 PJCC 记录。</p>

      </div>
      <div class="actions no-print">

        <button class="btn-primary" type="button" onclick="startTest()">开始测试</button>
      </div>
    </section>

    <section id="screenQuestion" class="card hidden">

      <div class="progress-wrap"><div id="progressBar" class="progress-bar"></div></div>
      <div id="questionText" class="question"></div>
      <div id="options"></div>
      <div class="actions no-print"><button class="btn-secondary" type="button" onclick="prevQuestion()">上一题</button><button class="btn-light" type="button" onclick="showReview()">查看进度</button><button class="btn-primary" type="button" onclick="nextQuestion()" id="btnNext">下一题</button></div>
    </section>

    <section id="screenReview" class="card hidden">
      <h2>检查答题进度</h2><p id="reviewSummary" class="muted"></p><div id="reviewGrid" class="review-grid"></div>
      <div class="actions no-print"><button class="btn-secondary" type="button" onclick="showQuestion()">返回继续作答</button><button class="btn-success" type="button" onclick="submitTest()">提交并计算结果</button></div>
    </section>

    <section id="screenResult" class="card hidden">
      <h1>测试结果</h1><p id="participantInfo" class="muted"></p><div id="trackingStatus" class="note no-print">正在提交记录到 PJCC...</div>
      <div class="two-col"><div><h2>主要恩赐 Top 3</h2><div id="topResults"></div></div><div><h2>分数说明</h2><p class="muted">每个恩赐由 5 道题组成。每题最高 3 分，因此每个恩赐最高 15 分。</p><p id="resultSummary" class="note"></p></div></div>
      <h2 style="margin-top:26px;">完整分数</h2><div id="allResults"></div>
      <div class="actions no-print"><button class="btn-secondary" type="button" onclick="restart()">重新开始</button><button class="btn-light" type="button" onclick="window.print()">打印 / 另存 PDF</button><button class="btn-primary" type="button" onclick="downloadCsv()">下载 CSV 结果</button></div>
    </section>
  </div>

const QUESTIONS = [{"id": 1, "text": "当我处在一个组织不够完善的团体中时，我倾 向于主动介入并填补空缺。", "giftCode": 1, "giftNameEN": "Administration", "giftNameCN": "行政", "sortOrder": 1}, {"id": 2, "text": "我经常响应呼召，在陌生的环境中向不信的人 和未加入教堂的人传道或教导福音信息。", "giftCode": 2, "giftNameEN": "Apostle", "giftNameCN": "使徒", "sortOrder": 2}, {"id": 3, "text": "我喜欢单身，并感受到上帝呼召我作为一个单 身信徒来事奉。", "giftCode": 3, "giftNameEN": "Celibacy", "giftNameCN": "独身", "sortOrder": 3}, {"id": 4, "text": "我听到其他人说过，我有能力区分真实的事物 和虚假的事物。", "giftCode": 4, "giftNameEN": "Discerning Of Spirits", "giftNameCN": "辨别灵性", "sortOrder": 4}, {"id": 5, "text": "我曾经带领其他人，藉着对上帝话语的信心， 来接受耶稣为他们的救主。", "giftCode": 5, "giftNameEN": "Evangelist", "giftNameCN": "布道", "sortOrder": 5}, {"id": 6, "text": "我喜欢鼓励那些沮丧和困扰的人，去信靠上 帝，体验祂的喜乐。", "giftCode": 6, "giftNameEN": "Exhortation", "giftNameCN": "劝勉", "sortOrder": 6}, {"id": 7, "text": "在多个场合众，我曾根据上帝的话语，命令邪灵离开一个被附身的人，而它们按照上帝的话 语离开了。", "giftCode": 7, "giftNameEN": "Exorcism", "giftNameCN": "驱鬼", "sortOrder": 7}, {"id": 8, "text": "其他团体成员通常会寻求我的指导和引导。", "giftCode": 8, "giftNameEN": "Faith", "giftNameCN": "信心", "sortOrder": 8}, {"id": 9, "text": "我善于理财，以便慷慨地奉献给主的工作。", "giftCode": 9, "giftNameEN": "Giving", "giftNameCN": "奉献", "sortOrder": 9}, {"id": 10, "text": "主曾经通过我，立即治愈了一些患病的人。", "giftCode": 10, "giftNameEN": "Healing", "giftNameCN": "医治", "sortOrder": 10}, {"id": 11, "text": "我喜欢帮助他人，无论是为了减轻他们的负 担，还是帮助他们完成重要的任务。", "giftCode": 11, "giftNameEN": "Helps", "giftNameCN": "助人", "sortOrder": 11}, {"id": 12, "text": "我经常为需要住宿的人提供我的住家。", "giftCode": 12, "giftNameEN": "Hospitality", "giftNameCN": "款待", "sortOrder": 12}, {"id": 13, "text": "我每天至少花一个小时，或者累计的 60 分钟为 他人祈祷。", "giftCode": 13, "giftNameEN": "Intercession", "giftNameCN": "代祷", "sortOrder": 13}, {"id": 14, "text": "我曾经在其他人的教导中，得到上帝的启示。", "giftCode": 14, "giftNameEN": "Interpretation", "giftNameCN": "解说", "sortOrder": 14}, {"id": 15, "text": "其他人告诉我，我曾经帮助他们区分了圣经中 的关键和重要的事实。", "giftCode": 15, "giftNameEN": "Knowledge", "giftNameCN": "知识", "sortOrder": 15}, {"id":  "当我奉主的名祷告时，我观察到超自然的恢 复。", "giftCode": 18, "giftNameEN": "Miracles", "giftNameCN": "行神迹", "sortOrder": 122}, {"id": 123, "text": "我强烈渴望看到并帮助其他国家的人们归向 主。", "giftCode": 19, "giftNameEN": "Missionary", "giftNameCN": "宣教", "sortOrder": 123}, {"id": 124, "text": "其他人告诉我，我帮助他们的属灵生命，社交 生，以及恢复的工作。", "giftCode": 20, "giftNameEN": "Pastor", "giftNameCN": "牧师", "sortOrder": 124}, {"id": 125, "text": "在特定的时间点上，我似乎知道上帝希望我和 其他人在服侍中做什么。", "giftCode": 21, "giftNameEN": "Prophecy", "giftNameCN": "预言", "sortOrder": 125}, {"id": 126, "text": "我经常被其他人请我做事情，即使是琐碎的任 务，我都乐意接受。", "giftCode": 22, "giftNameEN": "Service", "giftNameCN": "服侍", "sortOrder": 126}, {"id": 127, "text": "我在研读圣经和分享自己的见解时，获得巨大 的满足感。", "giftCode": 23, "giftNameEN": "Teaching", "giftNameCN": "教导", "sortOrder": 127}, {"id": 128, "text": "当圣灵通过我说话时，我相信这是在建立主的 身体。", "giftCode": 24, "giftNameEN": "Tongues", "giftNameCN": "说方言", "sortOrder": 128}, {"id": 129, "text": "穷人接纳我，因为我选择与他们生活在同一社 会经济水平上。", "giftCode": 25, "giftNameEN": "Voluntary Poverty", "giftNameCN": "自愿贫穷", "sortOrder": 129}, {"id": 130, "text": "在需要做重要决定时，我感受到了上帝的非比 寻常的同在和个人信心的坚定。", "giftCode": 26, "giftNameEN": "Wisdom", "giftNameCN": "智慧", "sortOrder": 130}];
const GIFTS = [{"code": 1, "en": "Administration", "cn": "行政"}, {"code": 2, "en": "Apostle", "cn": "使徒"}, {"code": 3, "en": "Celibacy", "cn": "独身"}, {"code": 4, "en": "Discerning Of Spirits", "cn": "辨别灵性"}, {"code": 5, "en": "Evangelist", "cn": "布道"}, {"code": 6, "en": "Exhortation", "cn": "劝勉"}, {"code": 7, "en": "Exorcism", "cn": "驱鬼"}, {"code": 8, "en": "Faith", "cn": "信心"}, {"code": 9, "en": "Giving", "cn": "奉献"}, {"code": 10, "en": "Healing", "cn": "医治"}, {"code": 11, "en": "Helps", "cn": "助人"}, {"code": 12, "en": "Hospitality", "cn": "款待"}, {"code": 13, "en": "Intercession", "cn": "代祷"}, {"code": 14, "en": "Interpretation", "cn": "解说"}, {"code": 15, "en": "Knowledge", "cn": "知识"}, {"code": 16, "en": "Leadership", "cn": "领导"}, {"code": 17, "en": "Mercy", "cn": "怜悯"}, {"code": 18, "en": "Miracles", "cn": "行神迹"}, {"code": 19, "en": "Missionary", "cn": "宣教"}, {"code": 20, "en": "Pastor", "cn": "牧师"}, {"code": 21, "en": "Prophecy", "cn": "预言"}, {"code": 22, "en": "Service", "cn": "服侍"}, {"code": 23, "en": "Teaching", "cn": "教导"}, {"code": 24, "en": "Tongues", "cn": "说方言"}, {"code": 25, "en": "Voluntary Poverty", "cn": "自愿贫穷"}, {"code": 26, "en": "Wisdom", "cn": "智慧"}];
const OPTIONS = [
  { text: '非常符合', score: 3 },
  { text: '有些符合', score: 2 },
  { text: '很少符合', score: 1 },
  { text: '完全不符合', score: 0 }
];
let state = { name: '', email: '', qIndex: 0, answers: {}, lastSubmissionPayload: null };

function saveState() { localStorage.setItem('spiritualGiftTestStateV3', JSON.stringify(state)); }
function loadState() {
  const raw = localStorage.getItem('spiritualGiftTestStateV3');
  if (raw) { try { state = Object.assign({ name:'', email:'', qIndex:0, answers:{}, lastSubmissionPayload:null }, JSON.parse(raw)); if (!state.answers) state.answers = {}; } catch(e) { console.warn(e); } }
  document.getElementById('name').value = state.name || '';
  document.getElementById('email').value = state.email || '';
  document.getElementById('flowUrl').value = localStorage.getItem('spiritualGiftFlowUrl') || '';
}
function show(screenId) { ['screenWelcome','screenQuestion','screenReview','screenResult'].forEach(function(id){ document.getElementById(id).classList.add('hidden'); }); document.getElementById(screenId).classList.remove('hidden'); }
function saveEndpoint() { const url = document.getElementById('flowUrl').value.trim(); if (!url) { alert('请先贴上 Power Automate HTTP POST URL。'); return; } localStorage.setItem('spiritualGiftFlowUrl', url); alert('Endpoint 已保存到此浏览器。'); }
function getEndpoint() { if (POWER_AUTOMATE_URL && !POWER_AUTOMATE_URL.includes('PASTE_YOUR_POWER_AUTOMATE')) return POWER_AUTOMATE_URL.trim(); return (localStorage.getItem('spiritualGiftFlowUrl') || document.getElementById('flowUrl').value || '').trim(); }
function setTrackingStatus(message, type) { const el = document.getElementById('trackingStatus'); el.className = (type === 'ok' ? 'oknote' : type === 'fail' ? 'failnote' : 'note') + ' no-print'; el.textContent = message; }
function startTest() { const name = document.getElementById('name').value.trim(); const email = document.getElementById('email').value.trim(); if (!name) { alert('请输入姓名后才开始测试。'); return; } state.name = name; state.email = email; if (!state.answers) state.answers = {}; if (typeof state.qIndex !== 'number' || state.qIndex < 0 || state.qIndex >= QUESTIONS.length) state.qIndex = 0; saveState(); renderQuestion(); show('screenQuestion'); }
function renderQuestion() { const q = QUESTIONS[state.qIndex]; if (!q) { alert('找不到题目，请刷新页面或清除记录后重试。'); return; } const answered = state.answers[String(q.id)]; document.getElementById('progressText').textContent = '问题 ' + (state.qIndex + 1) + ' / ' + QUESTIONS.length; document.getElementById('progressBar').style.width = (((state.qIndex + 1) / QUESTIONS.length) * 100) + '%'; document.getElementById('questionText').textContent = q.text; document.getElementById('btnNext').textContent = state.qIndex === QUESTIONS.length - 1 ? '完成' : '下一题'; document.getElementById('options').innerHTML = OPTIONS.map(function(o){ const checked = answered && Number(answered.score) === Number(o.score) ? 'checked' : ''; return '<label class="option"><input type="radio" name="answer" value="' + o.score + '" ' + checked + ' onchange="selectAnswer(\'' + o.text + '\',' + o.score + ')"><span>' + o.text + ' <span class="muted">(' + o.score + ')</span></span></label>'; }).join(''); }
function selectAnswer(text, score) { const q = QUESTIONS[state.qIndex]; state.answers[String(q.id)] = { questionId:q.id, giftCode:q.giftCode, giftNameCN:q.giftNameCN, giftNameEN:q.giftNameEN, selectedText:text, score:Number(score) }; saveState(); }
function nextQuestion() { const q = QUESTIONS[state.qIndex]; if (!state.answers[String(q.id)]) { alert('请选择一个答案。'); return; } if (state.qIndex < QUESTIONS.length - 1) { state.qIndex += 1; saveState(); renderQuestion(); } else { showReview(); } }
function prevQuestion() { if (state.qIndex > 0) { state.qIndex -= 1; saveState(); renderQuestion(); } else { show('screenWelcome'); } }
function showQuestion() { renderQuestion(); show('screenQuestion'); }
function showReview() { const answeredCount = Object.keys(state.answers || {}).length; document.getElementById('reviewSummary').textContent = '已回答 ' + answeredCount + ' / ' + QUESTIONS.length + ' 题'; document.getElementById('reviewGrid').innerHTML = QUESTIONS.map(function(q, idx){ const done = state.answers[String(q.id)] ? 'done' : ''; return '<div class="qdot ' + done + '" onclick="goToQuestion(' + idx + ')">' + q.id + '</div>'; }).join(''); show('screenReview'); }
function goToQuestion(index) { state.qIndex = Number(index); saveState(); renderQuestion(); show('screenQuestion'); }
function calculateResults() { const scores = GIFTS.map(function(g){ return { code:g.code, giftNameCN:g.cn, giftNameEN:g.en, totalScore:0 }; }); Object.keys(state.answers || {}).forEach(function(key){ const answer = state.answers[key]; const row = scores.find(function(s){ return s.code === answer.giftCode; }); if (row) row.totalScore += Number(answer.score || 0); }); scores.sort(function(a,b){ return b.totalScore - a.totalScore || a.code - b.code; }); return scores.map(function(r,index){ return { rank:index+1, code:r.code, giftNameCN:r.giftNameCN, giftNameEN:r.giftNameEN, totalScore:r.totalScore }; }); }
function makeSubmissionId() { return 'SG-' + new Date().toISOString().replace(/[-:.TZ]/g,'') + '-' + Math.random().toString(36).slice(2,8).toUpperCase(); }
function buildPayload(results) { const top3 = results.slice(0,3); const answers = QUESTIONS.map(function(q){ const a = state.answers[String(q.id)]; return { questionId:q.id, questionText:q.text, giftCode:q.giftCode, giftNameCN:q.giftNameCN, selectedText:a ? a.selectedText : '', score:a ? a.score : null }; }); return { submissionId: makeSubmissionId(), submittedAt: new Date().toISOString(), userName: state.name, email: state.email || '', topGift1: top3[0] ? top3[0].giftNameCN : '', topGift1EN: top3[0] ? top3[0].giftNameEN : '', topGift1Score: top3[0] ? top3[0].totalScore : 0, topGift2: top3[1] ? top3[1].giftNameCN : '', topGift2EN: top3[1] ? top3[1].giftNameEN : '', topGift2Score: top3[1] ? top3[1].totalScore : 0, topGift3: top3[2] ? top3[2].giftNameCN : '', topGift3EN: top3[2] ? top3[2].giftNameEN : '', topGift3Score: top3[2] ? top3[2].totalScore : 0, giftScores: results, answers: answers, allScoresJson: JSON.stringify(results), answersJson: JSON.stringify(answers), appVersion: 'HTML-v3-tracking', userAgent: navigator.userAgent }; }
async function sendToPowerAutomate(payload) { const url = getEndpoint(); state.lastSubmissionPayload = payload; saveState(); if (!url) { setTrackingStatus('记录尚未发送，请通知负责人。', 'fail'); return false; } try { await fetch(url, { method:'POST', headers:{ 'Content-Type':'application/json', 'Accept':'application/json' }, body: JSON.stringify(payload) }); setTrackingStatus('记录已发送到PJCC.谢谢参与。', 'ok'); return true; } catch (err) { console.error(err); setTrackingStatus('记录发送失败：' + err.message + '。请通知负责人。', 'fail'); return false; } }
async function submitTest() { if (Object.keys(state.answers || {}).length < QUESTIONS.length) { alert('还有题目未回答，请先完成所有题目。'); showReview(); return; } const results = calculateResults(); document.getElementById('participantInfo').textContent = '姓名：' + state.name + '    电邮：' + (state.email || '-') + '    日期：' + new Date().toLocaleString(); const top3 = results.slice(0,3); document.getElementById('topResults').innerHTML = top3.map(function(r){ return '<div class="top-card"><strong>' + r.rank + '. ' + r.giftNameCN + ' / ' + r.giftNameEN + '</strong><br>分数：' + r.totalScore + ' / 15</div>'; }).join(''); document.getElementById('resultSummary').textContent = '你的前三项属灵恩赐是：' + top3.map(function(r){ return r.giftNameCN; }).join('、') + '。'; document.getElementById('allResults').innerHTML = '<table><thead><tr><th>排名</th><th>恩赐</th><th>英文</th><th>分数</th></tr></thead><tbody>' + results.map(function(r){ return '<tr><td>' + r.rank + '</td><td>' + r.giftNameCN + '</td><td>' + r.giftNameEN + '</td><td>' + r.totalScore + ' / 15</td></tr>'; }).join('') + '</tbody></table>'; show('screenResult'); setTrackingStatus('正在提交记录到 PJCC...', ''); await sendToPowerAutomate(buildPayload(results)); }
async function resendLastSubmission() { if (!state.lastSubmissionPayload) { alert('没有可重新发送的提交记录。'); return; } setTrackingStatus('正在重新提交记录到 PJCC...', ''); await sendToPowerAutomate(state.lastSubmissionPayload); }
function downloadCsv() { const results = calculateResults(); const rows = [['Rank','GiftName_CN','GiftName_EN','TotalScore','MaxScore']]; results.forEach(function(r){ rows.push([r.rank,r.giftNameCN,r.giftNameEN,r.totalScore,15]); }); const csv = rows.map(function(row){ return row.map(function(value){ return '"' + String(value).replaceAll('"','""') + '"'; }).join(','); }).join('\n'); const blob = new Blob(['\ufeff' + csv], { type:'text/csv;charset=utf-8;' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'Spiritual_Gift_Result_' + (state.name || 'User') + '.csv'; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url); }
function restart() { state.qIndex = 0; state.answers = {}; saveState(); show('screenWelcome'); }
function clearAll() { if (confirm('确定要清除所有记录并重新开始吗？')) { localStorage.removeItem('spiritualGiftTestStateV3'); state = { name:'', email:'', qIndex:0, answers:{}, lastSubmissionPayload:null }; document.getElementById('name').value = ''; document.getElementById('email').value = ''; show('screenWelcome'); } }
loadState();
</script>
